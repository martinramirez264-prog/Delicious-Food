<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
  <style>

    body{
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .container{
      background:white;
      padding:30px;
      border-radius:15px;
      width:320px;
      text-align:center;
      box-shadow:0px 0px 15px rgba(0,0,0,0.3);
    }

    img{
      width:100px;
      margin-bottom:15px;
    }

    h2{
      margin-bottom:20px;
      color:#1e3c72;
    }

    input{
      width:100%;
      padding:10px;
      margin:10px 0;
      border-radius:8px;
      border:1px solid #ccc;
    }

    button{
      width:100%;
      padding:10px;
      margin-top:10px;
      border:none;
      border-radius:8px;
      background:#f39c12;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    button:hover{
      background:#d35400;
    }

  </style>

</head>
<body>

<div class="container">

  <img src="imgs/Logo.png" alt="Logo">

  <h2>Iniciar Sesión</h2>

  <input type="text" id="usuario" placeholder="Usuario">

  <input type="password" id="clave" placeholder="Contraseña">

  <button onclick="registrar()">Registrarse</button>

  <button onclick="login()">Entrar</button>

  <p class="crear-cuenta" onclick="mostrarRegistro()">
   ¿No tenés cuenta? Crear cuenta
  </p>

</div>

<script>

function registrar(){

   let usuario = document.getElementById("usuario").value;
   let clave = document.getElementById("clave").value;

   if(usuario == "" || clave == ""){

      alert("Completa todos los campos");
      return;
   }

   localStorage.setItem(usuario, clave);

   alert("Usuario registrado correctamente");
}

function login(){

   let usuario = document.getElementById("usuario").value;
   let clave = document.getElementById("clave").value;

   let claveGuardada = localStorage.getItem(usuario);

   if(clave == claveGuardada){

      localStorage.setItem("logueado", "si");

      window.location.href = "home.html";

   }else{

      alert("Usuario o contraseña incorrectos");
   }
   
   function mostrarRegistro(){

   alert("Completá usuario y contraseña y luego tocá Registrarse");
}
}

</script>

</body>
</html>
